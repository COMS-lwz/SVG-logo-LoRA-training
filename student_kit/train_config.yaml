model:
  name_or_path: "./gemma-3-270m-it"

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
    - up_proj
    - down_proj

training:
  train_data: "./logo-detailed-prompt/train.jsonl"
  valid_data: "./logo-detailed-prompt/valid.jsonl"
  output_dir: "./adapter"
  batch_size: 1
  gradient_accumulation: 8
  learning_rate: 2e-4
  num_epochs: 10
  max_length: 2048
  eval_steps: 25
  save_steps: 25
  warmup_ratio: 0.1
  weight_decay: 0.01
  early_stopping_patience: 3